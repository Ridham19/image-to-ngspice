<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSpice Studio - Professional</title>
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <div class="toolbar">
        <div class="toolbar-group">
            <button id="btnLoadImage" class="btn-primary">📸 Upload Circuit Image</button>
            <span id="statusText" class="status-text">Ready. Upload an image to start.</span>
        </div>
        <div class="toolbar-group">
            <button class="btn-secondary">⚙️ SPICE Config</button>
            <button class="btn-success">▶ RUN SIMULATION</button>
        </div>
    </div>

    <div class="main-container">
        <div class="canvas-container">
            <canvas id="circuitCanvas"></canvas>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">PROPERTIES</div>
            <div id="propertiesPanel" class="sidebar-content">
                <p style="color: #888; text-align: center; margin-top: 20px;">Select a component to edit</p>
            </div>
            
            <div class="sidebar-header" style="margin-top: 20px;">SIMULATION</div>
            <div class="sidebar-content">
                <p style="color: #4CAF50; font-family: monospace;">.op</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
