<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSpice Studio - Professional</title>
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <div class="toolbar">
        <div class="toolbar-group">
            <button id="btnLoadImage" class="btn-primary">📸 Import AI</button>
            <span id="statusText" class="status-text">Ready.</span>
        </div>
        
        <div class="toolbar-group tools">
            <button id="tool-select" class="btn-tool active">👆 Select</button>
            <button id="tool-wire" class="btn-tool">✏️ Wire</button>
            <button id="tool-resistor" class="btn-tool">⚡ Resistor</button>
            <button id="tool-capacitor" class="btn-tool">🔋 Capacitor</button>
            <button id="tool-source" class="btn-tool">🔌 Source</button>
        </div>

        <div class="toolbar-group">
            <button class="btn-success">▶ RUN</button>
        </div>
    </div>

    <div class="main-container">
        <div class="canvas-container" id="canvasWrapper">
            <canvas id="circuitCanvas"></canvas>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">PROPERTIES</div>
            <div id="propertiesPanel" class="sidebar-content">
                <p style="color: #888; text-align: center;">Select an object</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
